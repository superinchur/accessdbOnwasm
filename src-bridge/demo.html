<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>accessdb-bridge 테스트</title>
  <style>
    body { font-family: monospace; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #1e1e1e; color: #d4d4d4; }
    h2 { color: #9cdcfe; }
    label { display: block; margin-top: 16px; color: #9cdcfe; font-size: 13px; }
    input, textarea {
      width: 100%; box-sizing: border-box; margin-top: 4px;
      background: #2d2d2d; border: 1px solid #444; color: #d4d4d4;
      padding: 8px; font-family: monospace; font-size: 13px; border-radius: 4px;
    }
    .row { display: flex; gap: 8px; margin-top: 16px; }
    button {
      padding: 8px 20px; background: #0e639c; color: white; border: none;
      border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 13px;
    }
    button:hover { background: #1177bb; }
    button:disabled { background: #444; cursor: default; }
    #status { margin-top: 12px; font-size: 12px; color: #888; }
    #status.ok { color: #4ec9b0; }
    #status.err { color: #f44747; }
    #tables { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .table-chip {
      background: #2d2d2d; border: 1px solid #555; padding: 3px 10px;
      border-radius: 3px; cursor: pointer; font-size: 12px;
    }
    .table-chip:hover { border-color: #9cdcfe; color: #9cdcfe; }
    #result-wrap { margin-top: 24px; overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; font-size: 12px; }
    th { background: #2d2d2d; color: #9cdcfe; padding: 6px 10px; border: 1px solid #444; text-align: left; }
    td { padding: 5px 10px; border: 1px solid #333; }
    tr:hover td { background: #2a2a2a; }
    #row-count { margin-top: 6px; color: #888; font-size: 12px; }
  </style>
</head>
<body>
  <h2>🔌 accessdb-bridge 테스트</h2>
  <p style="color:#888;font-size:13px">
    VS Code에서 <b style="color:#d4d4d4">Start Bridge (dev)</b> 실행 후 사용하세요.<br>
    토큰: <code style="color:#ce9178">dev-test-token</code> &nbsp;|&nbsp; 포트: <code style="color:#ce9178">3456</code>
  </p>

  <div class="row">
    <button onclick="checkHealth()">▶ 브리지 연결 확인</button>
    <span id="status">—</span>
  </div>

  <label>📁 .accdb 파일 경로</label>
  <input id="file" type="text" placeholder="d:\system_bak.accdb" value="">

  <div class="row">
    <button onclick="loadTables()">테이블 목록 조회</button>
  </div>
  <div id="tables"></div>

  <label>SQL</label>
  <textarea id="sql" rows="3" placeholder="SELECT * FROM TAG_MST LIMIT 100"></textarea>

  <div class="row">
    <button onclick="runQuery()">▶ 쿼리 실행</button>
  </div>

  <div id="result-wrap"></div>
  <div id="row-count"></div>

  <script>
    const BASE = 'http://127.0.0.1:3456'
    const TOKEN = 'dev-test-token'

    function headers() {
      return { 'X-Bridge-Token': TOKEN, 'Content-Type': 'application/json' }
    }

    function setStatus(msg, type) {
      const el = document.getElementById('status')
      el.textContent = msg
      el.className = type || ''
    }

    async function checkHealth() {
      setStatus('확인 중...')
      try {
        const res = await fetch(`${BASE}/health`, { headers: headers() })
        const body = await res.json()
        if (body.ok) setStatus('✅ 브리지 연결 성공', 'ok')
        else setStatus('❌ ' + (body.error || '알 수 없는 오류'), 'err')
      } catch (e) {
        setStatus('❌ 연결 실패 — 브리지가 실행 중인지 확인하세요', 'err')
      }
    }

    async function loadTables() {
      const file = document.getElementById('file').value.trim()
      if (!file) { alert('파일 경로를 입력하세요'); return }
      setStatus('테이블 로딩...')
      try {
        const res = await fetch(`${BASE}/tables?file=${encodeURIComponent(file)}`, { headers: headers() })
        const body = await res.json()
        if (!body.ok) { setStatus('❌ ' + body.error, 'err'); return }
        setStatus(`✅ 테이블 ${body.tables.length}개`, 'ok')
        const wrap = document.getElementById('tables')
        wrap.innerHTML = body.tables.map(t =>
          `<span class="table-chip" onclick="selectTable('${t}')">${t}</span>`
        ).join('')
      } catch (e) {
        setStatus('❌ ' + e.message, 'err')
      }
    }

    function selectTable(name) {
      document.getElementById('sql').value = `SELECT * FROM [${name}] LIMIT 100`
    }

    async function runQuery() {
      const file = document.getElementById('file').value.trim()
      const sql = document.getElementById('sql').value.trim()
      if (!file) { alert('파일 경로를 입력하세요'); return }
      if (!sql) { alert('SQL을 입력하세요'); return }
      setStatus('쿼리 실행 중...')
      document.getElementById('result-wrap').innerHTML = ''
      document.getElementById('row-count').textContent = ''
      try {
        const res = await fetch(`${BASE}/query`, {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify({ file, sql })
        })
        const body = await res.json()
        if (!body.ok) { setStatus('❌ ' + body.error, 'err'); return }
        setStatus(`✅ ${body.rows.length}행 반환`, 'ok')
        renderTable(body.columns, body.rows)
      } catch (e) {
        setStatus('❌ ' + e.message, 'err')
      }
    }

    function renderTable(columns, rows) {
      if (!columns.length) {
        document.getElementById('result-wrap').innerHTML = '<p style="color:#888">결과 없음</p>'
        return
      }
      const th = columns.map(c => `<th>${c}</th>`).join('')
      const trs = rows.map(row =>
        `<tr>${row.map(v => `<td>${v === null ? '<span style="color:#888">NULL</span>' : v}</td>`).join('')}</tr>`
      ).join('')
      document.getElementById('result-wrap').innerHTML =
        `<table><thead><tr>${th}</tr></thead><tbody>${trs}</tbody></table>`
      document.getElementById('row-count').textContent = `총 ${rows.length}행 × ${columns.length}열`
    }
  </script>
</body>
</html>
